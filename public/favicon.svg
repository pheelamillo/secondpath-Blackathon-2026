<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Oxford Blue background -->
  <rect width="48" height="48" rx="10" fill="#0E1A2D"/>
  <!-- Bar 1 · Cosmic Latte -->
  <line x1="13" y1="42" x2="25" y2="8"
        stroke="#FAF3E0" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Bar 2 · Cosmic Latte (dimmed) -->
  <line x1="23" y1="42" x2="35" y2="8"
        stroke="#FAF3E0" stroke-width="5.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Persian Red dot at top of Bar 2 -->
  <circle cx="35" cy="6" r="4.5" fill="#C0392B"/>
</svg>
